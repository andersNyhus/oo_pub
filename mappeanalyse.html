<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappeanalyse</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e6ea;
    --text: #1a1e26;
    --muted: #6b7280;
    --accent: #1a56db;
    --accent-light: #e8f0fe;
    --ok: #15803d;
    --ok-bg: #f0fdf4;
    --warn: #b45309;
    --warn-bg: #fffbeb;
    --empty: #6b7280;
    --empty-bg: #f3f4f6;
    --danger: #b91c1c;
    --danger-bg: #fef2f2;
    --radius: 8px;
    --mono: 'Consolas', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; flex-shrink: 0;
  }

  .header h1 { font-size: 16px; font-weight: 600; }
  .header p { font-size: 12px; color: var(--muted); }

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }

  .input-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }

  input[type="text"] {
    flex: 1; min-width: 200px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); background: white; }

  .field { flex: 1; min-width: 160px; }
  .field-sm { width: 200px; flex: none; }

  button {
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .5; cursor: default; }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover:not(:disabled) { opacity: .9; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Progress */
  .progress-wrap { display: none; margin-top: 12px; }
  .progress-wrap.visible { display: block; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Stats row */
  .stats-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px;
  }
  .stat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .stat-num { font-weight: 700; }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .filter-btn {
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .filter-btn.active { border-color: currentColor; }
  .filter-all { color: var(--text); background: var(--border); }
  .filter-all.active { background: var(--text); color: white; }
  .filter-empty { color: var(--danger); background: var(--danger-bg); }
  .filter-empty.active { background: var(--danger); color: white; }
  .filter-warn { color: var(--warn); background: var(--warn-bg); }
  .filter-warn.active { background: var(--warn); color: white; }

  .search-box {
    flex: 1; min-width: 140px;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 12px; font-size: 12px; background: white; outline: none;
  }
  .search-box:focus { border-color: var(--accent); }

  .collapse-all-btn { margin-left: auto; }

  /* Tree */
  .tree { font-size: 13px; }

  .tree-node { }

  .tree-row {
    display: flex; align-items: center;
    padding: 3px 6px; border-radius: 5px;
    cursor: pointer;
    transition: background .1s;
    user-select: none;
    gap: 4px;
  }
  .tree-row:hover { background: var(--bg); }

  .tree-toggle {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 10px; border-radius: 3px;
    transition: transform .15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-toggle.leaf { color: transparent; cursor: default; }

  .tree-icon { font-size: 14px; flex-shrink: 0; }

  .tree-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }

  .tree-path-hint {
    font-size: 11px; color: var(--muted);
    font-family: var(--mono);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 280px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 7px; border-radius: 10px;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .badge-ok { background: var(--ok-bg); color: var(--ok); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-empty { background: var(--empty-bg); color: var(--empty); }
  .badge-root { background: var(--accent-light); color: var(--accent); }

  .tree-children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 4px; }
  .tree-children.hidden { display: none; }

  .file-row {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 6px; border-radius: 5px; color: var(--muted);
  }
  .file-row:hover { background: var(--bg); }
  .file-icon { font-size: 13px; flex-shrink: 0; }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 48px 24px; color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Error */
  .error-box {
    background: var(--danger-bg); border: 1px solid #fca5a5;
    border-radius: var(--radius); padding: 14px 16px; font-size: 13px;
    color: var(--danger); display: none;
  }
  .error-box.visible { display: block; }

  /* Dimmed for filter */
  .tree-node.dimmed { opacity: .25; pointer-events: none; }

  @media (max-width: 600px) {
    .tree-path-hint { display: none; }
    .input-row { flex-direction: column; }
    .field-sm { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📁</div>
  <div>
    <h1>Mappeanalyse</h1>
    <p>Rekursiv filtellingfor SharePoint-dokumentbibliotek</p>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="input-row" style="margin-bottom:12px">
      <div class="field">
        <label>SharePoint-site URL</label>
        <input type="text" id="siteUrl" placeholder="https://drtechnolavolsen.sharepoint.com/sites/invoprojects4/10671" />
      </div>
      <div class="field-sm">
        <label>Dokumentbibliotek</label>
        <input type="text" id="libName" value="Delte dokumenter" />
      </div>
      <button class="btn-primary" id="loadBtn" onclick="startLoad()">Last inn</button>
    </div>
    <p class="hint">💡 Lim inn URL til subsiten. Biblioteknavnet er vanligvis «Delte dokumenter» (norsk) eller «Documents» (engelsk).</p>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">Henter data…</div>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="stats-row" id="statsRow"></div>

    <div class="filter-bar">
      <button class="filter-btn filter-all active" onclick="setFilter('all', this)">Alle mapper</button>
      <button class="filter-btn filter-empty" onclick="setFilter('empty', this)">🔴 Helt tomme</button>
      <button class="filter-btn filter-warn" onclick="setFilter('warn', this)">🟡 Ingen direkte filer</button>
      <input class="search-box" id="searchBox" placeholder="Søk mappenavn…" oninput="filterSearch(this.value)" />
      <button class="btn-ghost collapse-all-btn" onclick="collapseAll()">Kollaps alle</button>
      <button class="btn-ghost" onclick="expandAll()">Utvid alle</button>
    </div>

    <div class="tree" id="treeRoot"></div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allItems = [];
let treeData = null;
let currentFilter = 'all';
let expandedNodes = new Set();
let showFiles = false;

// ── Load ──────────────────────────────────────────────────────────────────────
async function startLoad() {
  const siteUrl = document.getElementById('siteUrl').value.trim().replace(/\/$/, '');
  const libName = document.getElementById('libName').value.trim();
  if (!siteUrl) return showError('Skriv inn en SharePoint-URL.');

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('errorBox').classList.remove('visible');
  document.getElementById('resultCard').style.display = 'none';
  setProgress(0, 'Starter…');
  showProgress(true);

  try {
    allItems = await fetchAllItems(siteUrl, libName);
    setProgress(90, `Bygger tre for ${allItems.length} elementer…`);
    treeData = buildTree(allItems, siteUrl, libName);
    setProgress(100, 'Ferdig!');
    renderResult(treeData, libName);
  } catch (e) {
    showError(e.message);
  } finally {
    document.getElementById('loadBtn').disabled = false;
    showProgress(false);
  }
}

// ── Fetch all items (handles paging) ─────────────────────────────────────────
async function fetchAllItems(siteUrl, libName) {
  const encodedLib = encodeURIComponent(libName);
  let url = `${siteUrl}/_api/web/lists/getbytitle('${encodedLib}')/items`
    + `?$select=FileLeafRef,FileDirRef,FSObjType,FileRef,ID`
    + `&$top=2000`
    + `&$orderby=FileDirRef`;

  let items = [];
  let page = 0;

  while (url) {
    page++;
    setProgress(Math.min(10 + page * 8, 85), `Henter side ${page} (${items.length} elementer så langt)…`);

    const resp = await fetch(url, {
      headers: { 'Accept': 'application/json;odata=nometadata' },
      credentials: 'include'
    });

    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        throw new Error(`Ingen tilgang (${resp.status}). Pass på at du er logget inn på SharePoint og at siden er hostet på samme domene.`);
      }
      if (resp.status === 404) {
        throw new Error(`Fant ikke biblioteket «${libName}» på ${siteUrl}. Sjekk URL og biblioteknanv.`);
      }
      throw new Error(`HTTP ${resp.status} fra SharePoint. URL: ${url}`);
    }

    const json = await resp.json();
    items = items.concat(json.value || []);

    // Follow paging link if present
    url = json['odata.nextLink'] || json['@odata.nextLink'] || null;
    // Also check SP-style skiptoken
    if (!url && json['__next']) url = json['__next'];
  }

  return items;
}

// ── Build tree ────────────────────────────────────────────────────────────────
function buildTree(items, siteUrl, libName) {
  // Normalize site path for prefix stripping
  const sitePathRaw = new URL(siteUrl).pathname.replace(/\/$/, '');

  // Find root path = site path + / + library folder name
  // We detect it from the FileDirRef of items
  // e.g. /sites/invoprojects4/10671/Delte dokumenter
  // We'll determine the library root by looking at shortest FileDirRef
  const roots = new Set(items.map(i => i.FileDirRef));
  let libRoot = null;
  for (const r of roots) {
    if (!libRoot || r.length < libRoot.length) libRoot = r;
  }
  if (!libRoot) libRoot = sitePathRaw;

  // Build node map: path -> node
  const nodeMap = {};
  const getNode = (path) => {
    if (!nodeMap[path]) {
      nodeMap[path] = {
        path,
        name: path.split('/').pop() || path,
        children: {},
        files: [],
        _directFiles: 0,
        _totalFiles: 0,
        _totalFolders: 0,
      };
    }
    return nodeMap[path];
  };

  // Ensure root
  getNode(libRoot);

  // Process items
  for (const item of items) {
    const dir = item.FileDirRef;
    const isFolder = item.FSObjType === 1 || item.FSObjType === '1';
    const parentNode = getNode(dir);

    if (isFolder) {
      // This item IS a folder — its full path is dir + / + name
      const folderPath = dir + '/' + item.FileLeafRef;
      const folderNode = getNode(folderPath);
      folderNode.name = item.FileLeafRef;
      // Register as child of parent (avoid registering root as its own child)
      if (dir !== folderPath) {
        parentNode.children[folderPath] = true;
      }
    } else {
      parentNode.files.push(item.FileLeafRef);
      parentNode._directFiles++;
    }
  }

  // Make sure parent-child links are complete (in case intermediate folders had no direct items)
  for (const path of Object.keys(nodeMap)) {
    if (path === libRoot) continue;
    const parts = path.split('/');
    const parentPath = parts.slice(0, -1).join('/');
    if (parentPath && nodeMap[parentPath]) {
      nodeMap[parentPath].children[path] = true;
    }
  }

  // Convert children map to sorted arrays
  for (const node of Object.values(nodeMap)) {
    node.childList = Object.keys(node.children).sort((a, b) =>
      nodeMap[a]?.name?.localeCompare(nodeMap[b]?.name || '', 'no') || 0
    );
    delete node.children;
  }

  // Compute recursive totals bottom-up
  const computeTotals = (path) => {
    const node = nodeMap[path];
    if (!node) return;
    for (const cp of node.childList) computeTotals(cp);
    node._totalFiles = node._directFiles +
      node.childList.reduce((s, cp) => s + (nodeMap[cp]?._totalFiles || 0), 0);
    node._totalFolders = node.childList.length +
      node.childList.reduce((s, cp) => s + (nodeMap[cp]?._totalFolders || 0), 0);
  };
  computeTotals(libRoot);

  return { root: nodeMap[libRoot], nodeMap, libRoot };
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResult(treeData, libName) {
  const { root, nodeMap } = treeData;

  // Stats
  let totalFolders = 0, emptyFolders = 0, warnFolders = 0;
  for (const node of Object.values(nodeMap)) {
    totalFolders++;
    if (node._totalFiles === 0 && node.childList.length === 0) emptyFolders++;
    else if (node._directFiles === 0 && node.childList.length > 0 && node._totalFiles > 0) warnFolders++;
  }
  totalFolders--; // exclude root

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:var(--accent)"></div><span class="stat-num">${totalFolders}</span> mapper totalt</div>
    <div class="stat"><div class="stat-dot" style="background:var(--ok)"></div><span class="stat-num">${root._totalFiles}</span> filer totalt</div>
    <div class="stat"><div class="stat-dot" style="background:var(--danger)"></div><span class="stat-num">${emptyFolders}</span> helt tomme mapper</div>
    <div class="stat"><div class="stat-dot" style="background:var(--warn)"></div><span class="stat-num">${warnFolders}</span> mapper uten direkte filer</div>
  `;

  // Expand root and first level by default
  expandedNodes.clear();
  expandedNodes.add(treeData.libRoot);
  for (const cp of root.childList) expandedNodes.add(cp);

  renderTree();
  document.getElementById('resultCard').style.display = 'block';
}

function renderTree() {
  const container = document.getElementById('treeRoot');
  const { root, nodeMap, libRoot } = treeData;
  container.innerHTML = '';

  const searchVal = document.getElementById('searchBox').value.toLowerCase();

  // Filter: collect paths to show based on currentFilter + search
  const visiblePaths = getVisiblePaths(nodeMap, libRoot, searchVal);

  if (visiblePaths.size === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Ingen mapper matcher filteret.</p></div>';
    return;
  }

  container.appendChild(renderNode(libRoot, nodeMap, 0, visiblePaths, true));
}

function getVisiblePaths(nodeMap, libRoot, search) {
  const visible = new Set();

  const check = (path) => {
    const node = nodeMap[path];
    if (!node) return false;
    const nameMatch = !search || node.name.toLowerCase().includes(search);
    const filterMatch = matchesFilter(node);

    let childVisible = false;
    for (const cp of node.childList) {
      if (check(cp)) childVisible = true;
    }

    const show = nameMatch && filterMatch || childVisible;
    if (show) visible.add(path);
    return show;
  };

  check(libRoot);
  return visible;
}

function matchesFilter(node) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'empty') return node._totalFiles === 0 && node.childList.length === 0;
  if (currentFilter === 'warn') return node._directFiles === 0 && node.childList.length > 0;
  return true;
}

function renderNode(path, nodeMap, depth, visiblePaths, isRoot) {
  const node = nodeMap[path];
  if (!node || (!visiblePaths.has(path) && !isRoot)) return document.createDocumentFragment();

  const wrap = document.createElement('div');
  wrap.className = 'tree-node';
  wrap.dataset.path = path;

  // Row
  const row = document.createElement('div');
  row.className = 'tree-row';
  row.onclick = () => toggleNode(path);

  // Toggle arrow
  const toggle = document.createElement('div');
  toggle.className = 'tree-toggle' + (node.childList.length > 0 ? (expandedNodes.has(path) ? ' open' : '') : ' leaf');
  toggle.textContent = '▶';
  row.appendChild(toggle);

  // Icon
  const icon = document.createElement('div');
  icon.className = 'tree-icon';
  icon.textContent = isRoot ? '🗂️' : (node._totalFiles === 0 && node.childList.length === 0 ? '📁' : node._directFiles > 0 ? '📂' : '📁');
  row.appendChild(icon);

  // Name
  const name = document.createElement('div');
  name.className = 'tree-name';
  name.textContent = isRoot ? '(Rot)' : node.name;
  row.appendChild(name);

  // Badge
  const badge = document.createElement('div');
  badge.className = 'badge';
  if (isRoot) {
    badge.className += ' badge-root';
    badge.textContent = `${node._totalFiles} filer, ${node._totalFolders} mapper`;
  } else if (node.childList.length === 0 && node._totalFiles === 0) {
    badge.className += ' badge-empty';
    badge.textContent = '🔴 Tom';
  } else if (node._directFiles === 0 && node.childList.length > 0) {
    badge.className += ' badge-warn';
    badge.textContent = `🟡 ${node._totalFiles} (${node.childList.length} undermapper)`;
  } else {
    badge.className += ' badge-ok';
    badge.textContent = `✅ ${node._totalFiles}`;
    if (node.childList.length > 0) badge.textContent += ` (${node.childList.length} ↓)`;
  }
  row.appendChild(badge);

  wrap.appendChild(row);

  // Children container
  const children = document.createElement('div');
  children.className = 'tree-children' + (expandedNodes.has(path) ? '' : ' hidden');

  // File list (shown if node is expanded and has direct files and showFiles toggle)
  if (node.files && node.files.length > 0 && showFiles) {
    for (const f of node.files.slice(0, 50)) {
      const fr = document.createElement('div');
      fr.className = 'file-row';
      fr.innerHTML = `<div class="file-icon">${fileIcon(f)}</div><div class="file-name">${f}</div>`;
      children.appendChild(fr);
    }
    if (node.files.length > 50) {
      const more = document.createElement('div');
      more.className = 'file-row';
      more.style.color = 'var(--muted)';
      more.style.fontStyle = 'italic';
      more.textContent = `… og ${node.files.length - 50} filer til`;
      children.appendChild(more);
    }
  }

  // Sub-folders
  for (const cp of node.childList) {
    if (visiblePaths.has(cp)) {
      children.appendChild(renderNode(cp, nodeMap, depth + 1, visiblePaths, false));
    }
  }

  wrap.appendChild(children);
  return wrap;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    pdf: '📄', docx: '📝', doc: '📝', xlsx: '📊', xls: '📊',
    pptx: '📋', ppt: '📋', png: '🖼️', jpg: '🖼️', jpeg: '🖼️',
    gif: '🖼️', zip: '🗜️', rar: '🗜️', dwg: '📐', ifc: '🏗️',
    rvt: '🏗️', mp4: '🎬', mov: '🎬', msg: '📧',
  };
  return map[ext] || '📄';
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleNode(path) {
  if (expandedNodes.has(path)) {
    expandedNodes.delete(path);
  } else {
    expandedNodes.add(path);
  }
  renderTree();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTree();
}

function filterSearch(val) {
  // Auto-expand all when searching
  if (val.length > 1) {
    for (const path of Object.keys(treeData.nodeMap)) expandedNodes.add(path);
  }
  renderTree();
}

function collapseAll() {
  expandedNodes.clear();
  expandedNodes.add(treeData.libRoot);
  renderTree();
}

function expandAll() {
  for (const path of Object.keys(treeData.nodeMap)) expandedNodes.add(path);
  renderTree();
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function showProgress(visible) {
  document.getElementById('progressWrap').classList.toggle('visible', visible);
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('visible');
}

// Allow Enter key in inputs
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('input[type=text]').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') startLoad(); });
  });
});
</script>
</body>
</html>
